critical_bug: |
  100% of exits are signal_reversal (38) or external_close (23).
  stop_loss, take_profit, trailing_stop, time_exit NEVER fire in 61 trades.
  external_close likely = manual Telegram /sell. 10 external_closes
  exited BELOW the configured stop_loss level (meaning the position rode past its
  stop before being manually closed). This is the primary risk defect.
  Hypothesis: stop/TP orders are stored in DB but NOT submitted to broker as
  actual exchange stop orders, so they only trigger in the software position_monitor_loop.
  If the bot restarts or is paused, stops are lost. Also the position_monitor_loop
  may not be running reliably (check engine.py _position_monitor_loop).
